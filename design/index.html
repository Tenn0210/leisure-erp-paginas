<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design beoordelen</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f8;min-height:100vh;display:flex;flex-direction:column}
  .app-header{background:#1565c0;padding:16px 24px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .app-header img{height:40px;width:40px;object-fit:contain;border-radius:6px;background:#fff;padding:3px}
  .app-header .logo-placeholder{height:40px;width:40px;border-radius:6px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
  .app-header .bedrijfsnaam{color:#fff;font-size:17px;font-weight:600;letter-spacing:.2px}
  .app-header .subtitel{color:rgba(255,255,255,.7);font-size:12px;margin-top:1px}
  .pagina-body{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px}
  .kaart{background:#fff;border-radius:12px;padding:36px 40px;max-width:580px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1px solid #e2e8f0}
  h1{font-size:21px;font-weight:700;color:#1a202c;margin-bottom:6px}
  .sub{color:#64748b;font-size:14px;margin-bottom:24px}
  .info{background:#f8fafc;border-radius:8px;padding:16px;margin-bottom:24px;border:1px solid #e2e8f0}
  .info-rij{display:flex;justify-content:space-between;padding:5px 0;font-size:14px;border-bottom:1px solid #e2e8f0}
  .info-rij:last-child{border-bottom:none}
  .info-rij span:first-child{color:#64748b}
  .acties{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .btn{flex:1;min-width:130px;padding:13px 18px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .btn-akkoord{background:#16a34a;color:#fff}
  .btn-akkoord:hover:not(:disabled){background:#15803d}
  .btn-afwijzen{background:#fff;color:#dc2626;border:2px solid #dc2626}
  .btn-afwijzen:hover:not(:disabled){background:#fef2f2}
  .btn-doc{background:#1565c0;color:#fff;flex:0 0 auto;min-width:auto;padding:13px 20px}
  .btn-doc:hover:not(:disabled){background:#1251a3}
  .melding{padding:18px;border-radius:8px;text-align:center;font-size:15px;margin-top:16px;line-height:1.5}
  .melding-groen{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
  .melding-rood{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
  .wettelijk{font-size:12px;color:#94a3b8;margin-bottom:20px;line-height:1.6}
  .laden{text-align:center;padding:48px 0;color:#94a3b8}
  .spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#1565c0;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo-placeholder" id="logo-wrap">H</div>
  <div>
    <div class="bedrijfsnaam" id="header-bedrijfsnaam">Laden…</div>
    <div class="subtitel">Design beoordeling</div>
  </div>
</header>

<div class="pagina-body">
  <div class="kaart" id="kaart">
    <div class="laden">
      <div class="spinner"></div>
      <p>Document ophalen…</p>
    </div>
  </div>
</div>

<script>
const API = 'https://dfopkwhjvwfdowiuyygh.supabase.co/functions/v1'
const token = new URLSearchParams(location.search).get('token')
const kaart = document.getElementById('kaart')
const headerNaam = document.getElementById('header-bedrijfsnaam')
const logoWrap = document.getElementById('logo-wrap')

function datumNL(iso) { return new Date(iso).toLocaleDateString('nl-NL') }

function zetBranding(naam, logoUrl) {
  headerNaam.textContent = naam || 'Design beoordeling'
  document.title = naam ? `Design beoordelen — ${naam}` : 'Design beoordelen'
  if (logoUrl) {
    logoWrap.innerHTML = `<img src="${logoUrl}" alt="${naam}" onerror="this.parentNode.textContent='${(naam||'?')[0]}'"/>`
  } else if (naam) {
    logoWrap.textContent = naam[0].toUpperCase()
  }
}

function toonFout(titel, tekst) {
  kaart.innerHTML = `<h1>${titel}</h1><p class="sub">${tekst}</p>`
}

async function laad() {
  if (!token) { toonFout('Ongeldige link', 'Er ontbreekt een token in deze URL.'); return }

  let data
  try {
    const res = await fetch(`${API}/document-acceptatie?token=${encodeURIComponent(token)}`)
    data = await res.json()
  } catch { toonFout('Verbindingsfout', 'Probeer de pagina te herladen.'); return }

  zetBranding(data.bedrijfsnaam, data.logo_url)

  if (data.status === 'niet_gevonden') { toonFout('Link niet gevonden', 'Deze link bestaat niet of is verlopen.'); return }
  if (data.status === 'verlopen') { toonFout('Link verlopen', 'Deze link is verlopen. Neem contact op voor een nieuwe versie.'); return }
  if (data.status === 'al_gebruikt') {
    const cls = data.beslissing === 'akkoord' ? 'melding-groen' : 'melding-rood'
    const tekst = data.beslissing === 'akkoord' ? '✓ U heeft dit document al geaccepteerd.' : 'U heeft dit document al afgewezen.'
    kaart.innerHTML = `<h1>Al verwerkt</h1><div class="melding ${cls}">${tekst}</div>`
    return
  }

  const d = data.document
  const docKnop = data.document_url
    ? `<a href="${data.document_url}" target="_blank" class="btn btn-doc" style="text-decoration:none;display:inline-block">📄 Bekijk document</a>`
    : ''

  kaart.innerHTML = `
    <h1>${d.naam}</h1>
    <p class="sub">${d.type}</p>
    <div class="info">
      <div class="info-rij"><span>Document</span><span>${d.naam}</span></div>
      <div class="info-rij"><span>Type</span><span>${d.type || '—'}</span></div>
      <div class="info-rij"><span>Geldig tot</span><span>${datumNL(d.verloopt_op)}</span></div>
    </div>
    <p class="wettelijk">Door op "Akkoord" te klikken bevestigt u dat u dit document goedkeurt. Uw beslissing wordt vastgelegd met tijdstip en IP-adres.</p>
    <div class="acties">
      ${docKnop}
      <button class="btn btn-akkoord" id="btn-akkoord">✓ Akkoord</button>
      <button class="btn btn-afwijzen" id="btn-afwijzen">✕ Afwijzen</button>
    </div>
  `

  document.getElementById('btn-akkoord').onclick = () => stuurBeslissing('akkoord')
  document.getElementById('btn-afwijzen').onclick = () => stuurBeslissing('afgewezen')
}

async function stuurBeslissing(beslissing) {
  document.querySelectorAll('.btn').forEach(b => b.disabled = true)
  let data
  try {
    const res = await fetch(`${API}/document-acceptatie?token=${encodeURIComponent(token)}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({beslissing}),
    })
    data = await res.json()
  } catch { toonFout('Fout', 'Er is iets misgegaan. Probeer het opnieuw.'); return }

  if (data.success) {
    const cls = beslissing === 'akkoord' ? 'melding-groen' : 'melding-rood'
    const tekst = beslissing === 'akkoord'
      ? '✓ Bedankt! Uw akkoord is vastgelegd.'
      : 'Uw afwijzing is ontvangen. We nemen contact met u op.'
    document.querySelectorAll('.acties').forEach(el => el.remove())
    kaart.innerHTML += `<div class="melding ${cls}">${tekst}</div>`
  } else {
    toonFout('Fout', data.error ?? 'Onbekende fout.')
  }
}

laad()
</script>
</body>
</html>
